<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Legacy Auth Portal</title>
    <link rel="stylesheet" href="./public/styles.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>Legacy Auth Portal</h1>
      <p>Authenticate to access the admin diagnostics flag endpoint.</p>

      <section class="card">
        <h2>Login</h2>
        <label>Username</label>
        <input id="username" placeholder="admin" />
        <label>Password</label>
        <input id="password" type="password" placeholder="password" />
        <button id="loginBtn">Login</button>
        <pre id="loginResult">Waiting...</pre>
      </section>

      <section class="card">
        <h2>Session</h2>
        <button id="meBtn">GET /api/me</button>
        <button id="flagBtn">GET /api/flag</button>
        <pre id="apiResult">No request yet.</pre>
      </section>
    </main>

    <script src="./public/app.js"></script>
  </body>
</html>
